<section class="auth-page">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Welcome back</h1>
      <p>Sign in to your Matchy account.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
        <small class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Please enter a valid email.
        </small>
      </label>

      <label>
        Password
        <input type="password" formControlName="password" autocomplete="current-password" />
        <small class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password is required.
        </small>
      </label>

      <p class="error server-error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <footer class="auth-footer">
      No account yet?
      <a routerLink="/register">Create one</a>
    </footer>
  </div>
</section>
