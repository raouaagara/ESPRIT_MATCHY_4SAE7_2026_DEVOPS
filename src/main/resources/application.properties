spring.application.name=subscription-service
server.port=8084
server.servlet.context-path=/

spring.datasource.url=jdbc:mysql://localhost:3306/matchy_sub?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=127.0.0.1
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.matchy=DEBUG

spring.cloud.config.enabled=false
spring.cloud.openfeign.enabled=true
spring.cloud.openfeign.eureka.enabled=true

# Matchy User Microservice (Node backend) for user data hydration
matchy.backend.url=http://localhost:9090/api

# Mail (Mailtrap Sandbox)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=aaddc029a34a3f
spring.mail.password=2fe7b37e5a1862
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# Flouci Payment Gateway (placeholders - replace with real credentials)
flouci.app_token=your_flouci_app_token
flouci.app_secret=your_flouci_app_secret
flouci.success_url=http://localhost:4200/payment-success
flouci.fail_url=http://localhost:4200/payment-fail

# PayPal (placeholders)
paypal.client.id=your_client_id
paypal.client.secret=your_client_secret
paypal.mode=sandbox
paypal.success.url=http://localhost:4200/payment-success
paypal.cancel.url=http://localhost:4200/payment-cancel

# Feign client timeout — short so user enrichment never blocks payment flow
feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=3000

# Feign logging — affiche les appels inter-services dans la console
feign.client.config.default.loggerLevel=BASIC
logging.level.tn.esprit.matchy_sub.client=DEBUG
