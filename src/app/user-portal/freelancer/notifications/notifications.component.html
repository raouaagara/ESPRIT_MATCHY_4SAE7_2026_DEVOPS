<div class="notif-page">

  <!-- ── HEADER ── -->
  <div class="notif-header">
    <div class="header-left">
      <h1 class="notif-title">Notifications</h1>
      <span class="unread-badge" *ngIf="unreadCount > 0">{{ unreadCount }} unread</span>
    </div>
    <button class="btn-mark-all" (click)="markAllRead()" *ngIf="unreadCount > 0">
      ✓ Mark all as read
    </button>
  </div>

  <!-- ── FILTERS ── -->
  <div class="filter-bar">
    <button class="filter-btn" [class.active]="activeFilter === 'all'"    (click)="setFilter('all')">
      All <span class="filter-count">{{ notifications.length }}</span>
    </button>
    <button class="filter-btn" [class.active]="activeFilter === 'unread'" (click)="setFilter('unread')">
      Unread <span class="filter-count unread-count">{{ unreadCount }}</span>
    </button>
    <button class="filter-btn" [class.active]="activeFilter === 'read'"   (click)="setFilter('read')">
      Read
    </button>
  </div>

  <!-- ── LOADING ── -->
  <div class="loading-wrap" *ngIf="isLoading">
    <div class="loader"></div>
    <span>Loading notifications…</span>
  </div>

  <!-- ── EMPTY ── -->
  <div class="empty-state" *ngIf="!isLoading && filtered.length === 0">
    <div class="empty-icon">🔔</div>
    <p class="empty-title">No notifications</p>
    <p class="empty-sub">You're all caught up!</p>
  </div>

  <!-- ── LIST ── -->
  <div class="notif-list" *ngIf="!isLoading && filtered.length > 0">
    <div
      class="notif-card"
      *ngFor="let n of filtered"
      [class.unread]="!n.read"
      (click)="markRead(n)"
    >
      <!-- Left: icon + type badge -->
      <div class="card-left">
        <div class="notif-icon-wrap" [ngClass]="getTypeClass(n.type)">
          <span class="notif-icon">{{ getIcon(n.type) }}</span>
        </div>
        <div class="unread-dot" *ngIf="!n.read"></div>
      </div>

      <!-- Body -->
      <div class="card-body">
        <div class="card-top">
          <span class="type-tag" [ngClass]="getTypeClass(n.type)">{{ getTypeLabel(n.type) }}</span>
          <span class="notif-time">{{ timeAgo(n.createdAt) }}</span>
        </div>
        <p class="notif-title-text">{{ n.title }}</p>
        <p class="notif-msg">{{ n.message }}</p>
      </div>

      <!-- Actions -->
      <div class="card-actions">
        <button class="btn-read" *ngIf="!n.read" (click)="markRead(n); $event.stopPropagation()" title="Mark as read">✓</button>
        <button class="btn-del" (click)="deleteNotif($event, n.id!)" title="Delete">✕</button>
      </div>
    </div>
  </div>

</div>
